spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate.format_sql: true

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml
    enabled: true

  kafka:
    consumer:
      group-id: portfolio-group
      auto-offset-reset: earliest

app:
  kafka:
    topics:
      user-deleted: user-deleted
      user-profile-updated: user-profile-updated
      user-profile-avatar-updated: user-profile-avatar-updated
      project-created: project-created
      project-updated: project-updated
      project-deleted: project-deleted
      project-skill-added: project-skill-added
      project-skill-removed: project-skill-removed
      project-skills-updated: project-skills-updated
      project-preview-updated: project-preview-updated