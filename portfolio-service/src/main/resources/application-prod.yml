spring:
  datasource:
    url: jdbc:postgresql://portfolio_postgres:5432/${PORTFOLIO_SERVICE_POSTGRES_DB}
    username: ${PORTFOLIO_SERVICE_POSTGRES_USER}
    password: ${PORTFOLIO_SERVICE_POSTGRES_PASSWORD}

  kafka:
    bootstrap-servers: ${BOOTSTRAP_SERVERS}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER}