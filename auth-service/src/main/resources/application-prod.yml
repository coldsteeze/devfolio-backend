spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: 60000

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER}
  accessTokenExpirationMinutes: ${JWT_ACCESS_EXP_MINUTES}
  refreshTokenExpirationDays: ${JWT_REFRESH_EXP_DAYS}

