spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_service
    username: postgres
    password: postgres

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  kafka:
    bootstrap-servers: localhost:9094

server:
  port: 8081

jwt:
  secret: my-dev-secret
  issuer: dev-issuer
  access-token-expiration-minutes: 15
  refresh-token-expiration-days: 7

auth:
  cookie:
    name: refreshToken
    http-only: true
    secure: false
    same-site: None
    path: /api/auth
    max-age-days: 7

